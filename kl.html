<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Двоичный Калькулятор</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4ff, #e0e8ff);
      color: #1f2a44;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .calculator {
      background: white;
      padding: 30px 25px;
      border-radius: 28px;
      width: 370px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      border: 2px solid #b0d0ff;
    }

    h1 {
      text-align: center;
      color: #2a4a8c;
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 600;
    }

    .display {
      background: #f8faff;
      border: 3px solid #8ab4ff;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 25px;
      text-align: right;
      min-height: 120px;
      box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.08);
    }

    #expression {
      font-size: 34px;
      color: #1f2a44;
      font-weight: 500;
      min-height: 44px;
      word-break: break-all;
    }

    #result {
      font-size: 19px;
      color: #2a7c6e;
      margin-top: 14px;
      font-weight: 500;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px 10px;
      font-size: 24px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    button:active {
      transform: scale(0.95) translateY(2px);
    }

    .bin-digit {
      background: #e8f0ff;
      color: #1f4a8c;
    }

    .bin-digit:hover {
      background: #d0e0ff;
    }

    .operator {
      background: #7fb8ff;
      color: white;
    }

    .operator:hover {
      background: #6aa8f0;
    }

    .equals {
      background: #4adeb5;
      color: #1f3a44;
      font-weight: bold;
      grid-column: span 2;
    }

    .clear {
      background: #ff8a8a;
      color: white;
    }

    .back {
      background: #a0b0d0;
      color: white;
    }

    .info {
      text-align: center;
      margin-top: 20px;
      color: #5a7ab0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h1>Двоичный Калькулятор</h1>
    
    <div class="display">
      <div id="expression">0</div>
      <div id="result">Десятичный: 0</div>
    </div>

    <div class="buttons">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="back" onclick="backspace()">←</button>
      <button class="operator" onclick="addOperator('+')">+</button>
      <button class="operator" onclick="addOperator('-')">-</button>

      <button class="bin-digit" onclick="addDigit('1')">1</button>
      <button class="bin-digit" onclick="addDigit('0')">0</button>
      <button class="operator" onclick="addOperator('*')">×</button>
      <button class="operator" onclick="addOperator('/')">÷</button>

      <button class="bin-digit" onclick="addDigit('1')">1</button>
      <button class="bin-digit" onclick="addDigit('0')">0</button>
      <button class="bin-digit" onclick="addDigit('1')">1</button>
      <button class="bin-digit" onclick="addDigit('0')">0</button>

      <button class="equals" onclick="calculate()">=</button>
    </div>

    <div class="info">
      Только 0 и 1 • Результат в двоичной системе
    </div>
  </div>

  <script>
    let expression = "0";
    let shouldReset = false;

    function updateDisplay() {
      document.getElementById("expression").textContent = expression;
    }

    function addDigit(digit) {
      if (shouldReset) {
        expression = digit;
        shouldReset = false;
      } else {
        expression = expression === "0" ? digit : expression + digit;
      }
      updateDisplay();
    }

    function addOperator(op) {
      if (shouldReset) shouldReset = false;
      
      if (/[+\-*/]$/.test(expression)) {
        expression = expression.slice(0, -1) + op;
      } else {
        expression += op;
      }
      updateDisplay();
    }

    function calculate() {
      try {
        let match = expression.match(/([01]+)([+\-*/])([01]+)/);
        if (!match) throw "Ошибка";

        let num1 = parseInt(match[1], 2);
        let op = match[2];
        let num2 = parseInt(match[3], 2);

        let result;
        if (op === '+') result = num1 + num2;
        else if (op === '-') result = num1 - num2;
        else if (op === '*') result = num1 * num2;
        else if (op === '/') {
          if (num2 === 0) throw "Деление на ноль";
          result = num1 / num2;
        }

        let binResult = Math.floor(result).toString(2);

        document.getElementById("result").innerHTML = 
          `Десятичный: ${Math.floor(result)}<br><strong>Двоичный: ${binResult}</strong>`;

        expression = binResult;
        shouldReset = true;

      } catch (e) {
        document.getElementById("result").textContent = "Ошибка";
        expression = "0";
        shouldReset = true;
      }
      updateDisplay();
    }

    function clearAll() {
      expression = "0";
      shouldReset = false;
      document.getElementById("result").textContent = "Десятичный: 0";
      updateDisplay();
    }

    function backspace() {
      if (shouldReset) {
        clearAll();
        return;
      }
      expression = expression.length > 1 ? expression.slice(0, -1) : "0";
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
